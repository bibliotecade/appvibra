<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Botones Neón 3D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0f12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            justify-items: center;
            align-items: center;
        }

        /* Estilo base de los botones 3D */
        .btn-neon-3d {
            width: 240px;
            height: 80px;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 50px;
            position: relative;
            background: linear-gradient(145deg, #2c3036, #1a1d21);
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 15px;
        }

        /* Efecto de hundimiento al pulsar (Efecto 3D físico) */
        .btn-neon-3d:active {
            transform: translateY(6px);
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 2px 0 #111315,
                0 5px 10px rgba(0, 0, 0, 0.6);
        }

        /* Colores del Neón (Asignados por clases) */
        
        /* Respuestas A, B, C, D - Neón Azul Cyan */
        .btn-blue {
            border: 2px solid #00f0ff;
            text-shadow: 0 0 5px #00f0ff;
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(0, 240, 255, 0.3);
        }
        .btn-blue:hover {
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 25px rgba(0, 240, 255, 0.6),
                0 0 30px rgba(0, 240, 255, 0.6);
            background: linear-gradient(145deg, #33383f, #1e2126);
        }
        .btn-blue:active {
            box-shadow: 0 2px 0 #111315, 0 0 20px rgba(0, 240, 255, 0.6);
        }

        /* Todo Bien - Neón Verde Esmeralda */
        .btn-green {
            border: 2px solid #00ff66;
            text-shadow: 0 0 5px #00ff66;
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(0, 255, 102, 0.3);
        }
        .btn-green:hover {
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 25px rgba(0, 255, 102, 0.6),
                0 0 30px rgba(0, 255, 102, 0.6);
            background: linear-gradient(145deg, #33383f, #1e2126);
        }
        .btn-green:active {
            box-shadow: 0 2px 0 #111315, 0 0 20px rgba(0, 255, 102, 0.6);
        }

        /* Hay un Error - Neón Rojo Magenta */
        .btn-red {
            border: 2px solid #ff0055;
            text-shadow: 0 0 5px #ff0055;
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(ff, 0, 85, 0.3);
        }
        .btn-red:hover {
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 25px rgba(255, 0, 85, 0.6),
                0 0 30px rgba(255, 0, 85, 0.6);
            background: linear-gradient(145deg, #33383f, #1e2126);
        }
        .btn-red:active {
            box-shadow: 0 2px 0 #111315, 0 0 20px rgba(255, 0, 85, 0.6);
        }

        /* Neón Orange (Naranja Eléctrico) */
        .btn-orange {
            border: 2px solid #ff6c00;
            text-shadow: 0 0 5px #ff6c00;
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(255, 108, 0, 0.3);
        }
        .btn-orange:hover {
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 25px rgba(255, 108, 0, 0.6),
                0 0 30px rgba(255, 108, 0, 0.6);
            background: linear-gradient(145deg, #33383f, #1e2126);
        }
        .btn-orange:active { box-shadow: 0 2px 0 #111315, 0 0 20px rgba(255, 108, 0, 0.6); }

        /* Neón Violet (Violeta / Morado Cósmico) */
        .btn-violet {
            border: 2px solid #b026ff;
            text-shadow: 0 0 5px #b026ff;
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(176, 38, 255, 0.3);
        }
        .btn-violet:hover {
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 25px rgba(176, 38, 255, 0.6),
                0 0 30px rgba(176, 38, 255, 0.6);
            background: linear-gradient(145deg, #33383f, #1e2126);
        }
        .btn-violet:active { box-shadow: 0 2px 0 #111315, 0 0 20px rgba(176, 38, 255, 0.6); }

        /* Neón Yellow (Amarillo Neón / Radioactivo) */
        .btn-yellow {
            border: 2px solid #ffee00;
            text-shadow: 0 0 5px #ffee00;
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(255, 238, 0, 0.3);
        }
        .btn-yellow:hover {
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                inset -2px -2px 5px rgba(0, 0, 0, 0.7),
                0 8px 0 #111315,
                0 15px 25px rgba(255, 238, 0, 0.6),
                0 0 30px rgba(255, 238, 0, 0.6);
            background: linear-gradient(145deg, #33383f, #1e2126);
        }
        .btn-yellow:active { box-shadow: 0 2px 0 #111315, 0 0 20px rgba(255, 238, 0, 0.6); }
        /* SECCIÓN SUPERIOR: CONFIRMACIÓN */

/* SECCIÓN SUPERIOR: CONFIRMACIÓN FORZADA ENCIMA */
.header-panel {
    position: absolute; /* Hace que flote independientemente de los otros botones */
    top: 20px;          /* Lo pega a la parte superior de la pantalla */
    left: 50%;
    transform: translateX(-50%); /* Lo centra perfectamente horizontal */
    
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    background: #14171c;
    padding: 15px 35px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    border: 1px solid #222730;
    text-align: center;
    z-index: 9999; /* Asegura que quede por encima de cualquier otro botón */
}

.header-title {
    color: #ffffff;
    font-size: 1.2rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
}

.confirmation-buttons {
    display: flex;
    gap: 20px;
}

/* Botones pequeños SÍ y NO */
.btn-small {
    width: 85px !important;
    height: 40px !important;
    font-size: 0.85rem !important;
    border-radius: 25px !important;
    box-shadow: 
        inset 1px 1px 3px rgba(255, 255, 255, 0.1),
        inset -1px -1px 3px rgba(0, 0, 0, 0.7),
        0 5px 0 #111315,
        0 10px 15px rgba(0, 0, 0, 0.6) !important;
}

.btn-small:active {
    transform: translateY(4px) !important;
    box-shadow: 
        inset 1px 1px 3px rgba(255, 255, 255, 0.1),
        inset -1px -1px 3px rgba(0, 0, 0, 0.7),
        0 1px 0 #111315,
        0 3px 5px rgba(0, 0, 0, 0.6) !important;
}
    </style>
</head>
<body>

  <div class="header-panel">
    <div class="header-title">Confirmar el envío</div>
    <div class="confirmation-buttons">
        <button class="btn-neon-3d btn-green btn-small">SÍ</button>
        <button class="btn-neon-3d btn-red btn-small">NO</button>
    </div>
</div>

    <div class="container">
        <button class="btn-neon-3d btn-blue">Respuesta A</button>
        <button class="btn-neon-3d btn-orange">Respuesta B</button>
        <button class="btn-neon-3d btn-violet">Respuesta C</button>
        <button class="btn-neon-3d btn-yellow">Respuesta D</button>
        <button class="btn-neon-3d btn-green">Todo bien, manda la siguiente</button>
        <button class="btn-neon-3d btn-red">Hay un error</button>
    </div>



    <script>
    // Variable para almacenar el patrón de vibración del botón seleccionado
    let vibracionPendiente = null;

    // Definición de los patrones de vibración personalizados
    // [tiempo_vibración, tiempo_pausa, tiempo_vibración, ...] (en milisegundos)
    const patrones = {
        'Respuesta A': [500],                             // 1 vibración de 0.5s
        'Respuesta B': [500, 200, 500],                   // 2 vibraciones de 0.5s (pausa de 0.2s)
        'Respuesta C': [500, 200, 500, 200, 500],         // 3 vibraciones de 0.5s
        'Respuesta D': [500, 200, 500, 200, 500, 200, 500], // 4 vibraciones de 0.5s
        'Todo bien, manda la siguiente': [1500, 300, 1500], // 2 vibraciones de 1.5s (pausa de 0.3s)
        'Hay un error': [200, 100, 200, 100, 200, 100, 200, 100, 200] // 5 vibraciones de 0.2s (pausa de 0.1s)
    };

    // 1. Escuchar los clics en los botones del panel principal (Grandes)
    document.querySelectorAll('.container .btn-neon-3d').forEach(boton => {
        boton.addEventListener('click', () => {
            const textoBoton = boton.textContent.trim();
            
            // Buscamos si el botón pulsado tiene un patrón asignado
            if (patrones[textoBoton]) {
                vibracionPendiente = patrones[textoBoton];
                console.log(`Seleccionado: ${textoBoton}. Esperando confirmación...`);
                
                // Opcional: Dar un feedback visual en la consola o UI de que está seleccionado
                boton.style.opacity = "0.7";
                setTimeout(() => boton.style.opacity = "1", 200);
            }
        });
    });

    // 2. Escuchar el botón SÍ (Confirmar envío)
    document.querySelector('.btn-green.btn-small').addEventListener('click', () => {
        if (vibracionPendiente && navigator.vibrate) {
            // Ejecuta la vibración guardada en el dispositivo
            navigator.vibrate(vibracionPendiente);
            console.log("Envío confirmado: Ejecutando vibración.");
            vibracionPendiente = null; // Limpia la cola tras enviar
        } else if (!navigator.vibrate) {
            console.log("Tu navegador o dispositivo no soporta la API de vibración.");
        } else {
            console.log("No hay ninguna respuesta seleccionada para enviar.");
        }
    });

    // 3. Escuchar el botón NO (Cancelar envío)
    document.querySelector('.btn-red.btn-small').addEventListener('click', () => {
        console.log("Envío cancelado. Vibración descartada.");
        vibracionPendiente = null; // Borra la vibración guardada para que no ocurra nada
    });
</script>

</body>
</html>
