<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vibración Remota 3D</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0f12;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CONFIGURACIÓN DEL SLIDER DE INTENSIDAD */
        .slider-panel {
            background: #14171c;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #222730;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .slider-panel label {
            color: #ff6c00;
            text-shadow: 0 0 5px rgba(255,108,0,0.4);
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .intensity-slider {
            width: 100%;
            -webkit-appearance: none;
            background: #2c3036;
            height: 8px;
            border-radius: 5px;
            outline: none;
        }
        .intensity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6c00;
            cursor: pointer;
            box-shadow: 0 0 10px #ff6c00;
        }

        /* CONFIRMACIÓN (FIJA ARRIBA) */
        .header-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #14171c;
            padding: 15px 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #222730;
            text-align: center;
            margin-bottom: 30px;
        }
        .header-title {
            color: #ffffff; font-size: 1.2rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .confirmation-buttons { display: flex; gap: 20px; }

        /* CONTENEDOR BOTONES GRANDES */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px; width: 100%; max-width: 900px;
            justify-items: center; align-items: center;
        }

        /* ESTILO GENERAL BOTONES 3D */
        .btn-neon-3d {
            width: 240px; height: 75px; border: none; outline: none;
            color: #ffffff; font-size: 1rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            border-radius: 50px; background: linear-gradient(145deg, #2c3036, #1a1d21);
            transition: all 0.2s ease; display: flex; justify-content: center;
            align-items: center; text-align: center; padding: 0 15px;
        }
        .btn-neon-3d:active {
            transform: translateY(4px);
        }

        .btn-small { width: 90px !important; height: 45px !important; border-radius: 25px !important; }

        /* COLORES NEÓN */
        .btn-blue { border: 2px solid #00f0ff; text-shadow: 0 0 5px #00f0ff; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 0 6px 0 #111315, 0 0 15px rgba(0, 240, 255, 0.2); }
        .btn-blue:active { box-shadow: 0 2px 0 #111315, 0 0 15px rgba(0, 240, 255, 0.5); }
        .btn-green { border: 2px solid #00ff66; text-shadow: 0 0 5px #00ff66; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 0 6px 0 #111315, 0 0 15px rgba(0, 255, 102, 0.2); }
        .btn-green:active { box-shadow: 0 2px 0 #111315, 0 0 15px rgba(0, 255, 102, 0.5); }
        .btn-red { border: 2px solid #ff0055; text-shadow: 0 0 5px #ff0055; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 0 6px 0 #111315, 0 0 15px rgba(255, 0, 85, 0.2); }
        .btn-red:active { box-shadow: 0 2px 0 #111315, 0 0 15px rgba(255, 0, 85, 0.5); }
        .btn-orange { border: 2px solid #ff6c00; text-shadow: 0 0 5px #ff6c00; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 0 6px 0 #111315, 0 0 15px rgba(255, 108, 0, 0.2); }
        .btn-violet { border: 2px solid #b026ff; text-shadow: 0 0 5px #b026ff; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 0 6px 0 #111315, 0 0 15px rgba(176, 38, 255, 0.2); }
        .btn-yellow { border: 2px solid #ffee00; text-shadow: 0 0 5px #ffee00; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 0 6px 0 #111315, 0 0 15px rgba(255, 238, 0, 0.2); }

        /* MODO RECEPTOR (PANTALLA LIMPIA) */
        .receptor-view {
            display: none; text-align: center; color: #ffffff;
        }
        .pulse-glow {
            width: 120px; height: 120px; border-radius: 50%;
            background: #00f0ff; box-shadow: 0 0 30px #00f0ff;
            margin: 30px auto; animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 20px #00f0ff; }
            to { transform: scale(1.1); opacity: 1; box-shadow: 0 0 50px #00f0ff; }
        }
    </style>
</head>
<body>

    <div id="vista-emisor">
        <div class="slider-panel">
            <label for="intensity">Intensidad de Vibración: <span id="val-intensidad">100</span>%</label>
            <input type="range" id="intensity" class="intensity-slider" min="10" max="100" value="100" step="10">
        </div>

        <div class="header-panel">
            <div class="header-title">Confirmar el envío remoto</div>
            <div class="confirmation-buttons">
                <button class="btn-neon-3d btn-green btn-small" id="btn-si">SÍ</button>
                <button class="btn-neon-3d btn-red btn-small" id="btn-no">NO</button>
            </div>
        </div>

        <div class="container">
            <button class="btn-neon-3d btn-blue" data-patron="A">Respuesta A</button>
            <button class="btn-neon-3d btn-blue" data-patron="B">Respuesta B</button>
            <button class="btn-neon-3d btn-blue" data-patron="C">Respuesta C</button>
            <button class="btn-neon-3d btn-blue" data-patron="D">Respuesta D</button>
            <button class="btn-neon-3d btn-green" data-patron="OK">Todo bien, manda la siguiente</button>
            <button class="btn-neon-3d btn-red" data-patron="ERROR">Hay un error</button>
            <button class="btn-neon-3d btn-orange" data-patron="ORANGE">Botón Orange</button>
            <button class="btn-neon-3d btn-violet" data-patron="VIOLET">Botón Violet</button>
            <button class="btn-neon-3d btn-yellow" data-patron="YELLOW">Botón Yellow</button>
        </div>
    </div>

    <div id="vista-receptor" class="receptor-view">
        <h1 style="text-transform: uppercase; letter-spacing: 2px;">Dispositivo Receptor Conectado</h1>
        <p style="color: #6c757d; margin-top: 10px;">Coloca este móvil donde quieras recibir las vibraciones.</p>
        <div class="pulse-glow"></div>
    </div>

    <script>
        // 1. CONFIGURACIÓN DE FIREBASE (Base de datos en tiempo real pública temporal)
        // He configurado este entorno de prueba para que os podáis conectar directamente sin crear cuenta.
        const firebaseConfig = {
            databaseURL: "https://vibrador-remoto-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. DETECCIÓN DE MODO (¿Es emisor o receptor?)
        const urlParams = new URLSearchParams(window.location.search);
        const esReceptor = urlParams.get('modo') === 'receptor';

        if (esReceptor) {
            document.getElementById('vista-emisor').style.display = 'none';
            document.getElementById('vista-receptor').style.display = 'block';
            inicializarReceptor();
        } else {
            inicializarEmisor();
        }

        // 3. LÓGICA DEL EMISOR (EL MANDO)
        function inicializarEmisor() {
            let botonSeleccionado = null;
            const slider = document.getElementById('intensity');
            const valIntensidad = document.getElementById('val-intensidad');

            slider.addEventListener('input', () => { valIntensidad.textContent = slider.value; });

            // Al hacer clic en un botón grande, guardamos temporalmente el ID del patrón
            document.querySelectorAll('.container .btn-neon-3d').forEach(btn => {
                btn.addEventListener('click', () => {
                    botonSeleccionado = btn.getAttribute('data-patron');
                    btn.style.opacity = "0.5";
                    setTimeout(() => btn.style.opacity = "1", 200);
                });
            });

            // Confirmar Envío (SÍ) -> Envía a Firebase el comando con la intensidad
            document.getElementById('btn-si').addEventListener('click', () => {
                if (botonSeleccionado) {
                    database.ref('vibracion').set({
                        patron: botonSeleccionado,
                        intensidad: parseInt(slider.value),
                        timestamp: Date.now() // Forzar cambio en base de datos
                    });
                    botonSeleccionado = null; // Limpiar cola
                }
            });

            // Cancelar Envío (NO)
            document.getElementById('btn-no').addEventListener('click', () => { botonSeleccionado = null; });
        }

        // 4. LÓGICA DEL RECEPTOR (EL QUE VIBRA)
        function inicializarReceptor() {
            // Escuchar los cambios en Firebase en tiempo real
            database.ref('vibracion').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data || !navigator.vibrate) return;

                // Modificador de intensidad emulado por software (Fragmentación de pulsos)
                // Si la intensidad es 100%, el ciclo activo es continuo (vibrar todo el bloque).
                // Si es menor, cortamos la vibración en pequeños trozos imperceptibles para bajar la fuerza.
                const factor = data.intensidad / 100;
                
                // Función para transformar la duración base en pulsos adaptados a la intensidad
                function aplicarIntensidad(msTotales) {
                    if (factor === 1) return [msTotales];
                    let secuencia = [];
                    let transcurrido = 0;
                    const tamanoPulso = 40; // Tamaño de fragmentación base en ms
                    
                    while (transcurrido < msTotales) {
                        let activo = Math.round(tamanoPulso * factor);
                        let pasivo = tamanoPulso - activo;
                        secuencia.push(activo, pasivo);
                        transcurrido += tamanoPulso;
                    }
                    return secuencia;
                }

                // Definimos la estructura base de cada botón en milisegundos planos
                let secuenciaBase = [];
                switch(data.patron) {
                    case 'A': secuenciaBase = [500]; break;
                    case 'B': secuenciaBase = [500, 200, 500]; break;
                    case 'C': secuenciaBase = [500, 200, 500, 200, 500]; break;
                    case 'D': secuenciaBase = [500, 200, 500, 200, 500, 200, 500]; break;
                    case 'OK': secuenciaBase = [1500, 300, 1500]; break;
                    case 'ERROR': secuenciaBase = [200, 100, 200, 100, 200, 100, 200, 100, 200]; break;
                    case 'ORANGE': secuenciaBase = [800, 100, 800]; break;
                    case 'VIOLET': secuenciaBase = [300, 300, 300, 300]; break;
                    case 'YELLOW': secuenciaBase = [1000, 500, 200]; break;
                }

                // Procesamos la secuencia base troceándola según el slider de intensidad
                let secuenciaFinal = [];
                for (let i = 0; i < secuenciaBase.length; i++) {
                    if (i % 2 === 0) {
                        // Es un tiempo de vibración activa -> lo modulamos con el slider
                        secuenciaFinal = secuenciaFinal.concat(aplicarIntensidad(secuenciaBase[i]));
                    } else {
                        // Es un tiempo de silencio/pausa original entre pulsos -> se respeta tal cual
                        secuenciaFinal.push(secuenciaBase[i]);
                    }
                }

                // Ejecutar la vibración procesada en el móvil receptor
                navigator.vibrate(secuenciaFinal);
            });
        }
    </script>
</body>
</html>
